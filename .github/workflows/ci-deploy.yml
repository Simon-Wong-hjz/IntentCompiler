name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - run: npm run lint

      - run: npm run test

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$ECS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPT="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          REMOTE_DIR="/var/www/html/intent-compiler"

          tar czf /tmp/deploy.tar.gz -C dist/ .
          ssh $SSH_OPT root@"$ECS_HOST" "rm -rf $REMOTE_DIR && mkdir -p $REMOTE_DIR"
          scp $SSH_OPT /tmp/deploy.tar.gz root@"$ECS_HOST":/tmp/deploy.tar.gz
          ssh $SSH_OPT root@"$ECS_HOST" "tar xzf /tmp/deploy.tar.gz -C $REMOTE_DIR && rm -f /tmp/deploy.tar.gz"
